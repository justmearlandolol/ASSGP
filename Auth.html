<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-size: Cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      width: 100%;
     height: 100%;
     --color: #E1E1E1;
    background-color: #F3F3F3;
     background-image: linear-gradient(0deg, transparent 24%, var(--color) 25%, var(--color) 26%, transparent 27%,transparent 74%, var(--color) 75%, var(--color) 76%, transparent 77%,transparent),
      linear-gradient(90deg, transparent 24%, var(--color) 25%, var(--color) 26%, transparent 27%,transparent 74%, var(--color) 75%, var(--color) 76%, transparent 77%,transparent);
    background-size: 55px 55px;
    }
    .form {
      --background: #ffffff;
      --main-color: #323232;
      padding: 24px;
      background: var(--background);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      border-radius: 5px;
      border: 2px solid var(--main-color);
      box-shadow: 4px 4px var(--main-color);
      width: 100%;
      max-width: 320px;
    }
    .form > p {
      color: #323232;
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .form > p > span {
      color: #666;
      font-weight: 600;
      font-size: 15px;
    }
    .separator {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .separator > div {
      width: 80px;
      height: 3px;
      border-radius: 5px;
      background-color: #666;
    }
    .separator > span {
      color: #323232;
      font-weight: 600;
      font-size: 14px;
    }
    .oauthButton {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 0 15px;
      width: 100%;
      height: 44px;
      border-radius: 5px;
      border: 2px solid #323232;
      background-color: #fff;
      box-shadow: 4px 4px #323232;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: #323232;
      cursor: pointer;
      transition: all 250ms;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }
    .oauthButton::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      height: 100%; width: 0;
      background-color: #212121;
      z-index: -1;
      transition: all 250ms;
    }
    .oauthButton:hover { color: #e8e8e8; }
    .oauthButton:hover::before { width: 100%; }
    .oauthButton:disabled {
      background-color: #e2e8f0;
      color: #94a3b8;
      cursor: not-allowed;
      box-shadow: none;
    }
    .form > input {
      width: 100%;
      height: 44px;
      border-radius: 5px;
      border: 2px solid #323232;
      background-color: #fff;
      box-shadow: 4px 4px #323232;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: #323232;
      padding: 5px 12px;
      outline: none;
    }
    .icon { width: 1.25rem; height: 1.25rem; flex-shrink: 0; }
    .alert-box {
      display: none;
      width: 100%;
      max-width: 320px;
      padding: 12px;
      border: 2px solid #323232;
      border-radius: 5px;
      margin-bottom: 15px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 3px 3px #323232;
    }
    .alert-box.error { display: block; background-color: #ffccd5; color: #b91c1c; }
    .alert-box.success { display: block; background-color: #d1e7dd; color: #0f5132; }
  </style>
</head>
<body>

  <div id="alertBox" class="alert-box"></div>

  <form id="loginForm" class="form" onsubmit="return false;">
    <p>Welcome,<span>Sign in to continue</span></p>
    
    <button id="btnGoogle" type="button" class="oauthButton">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
      </svg>
      Continue with Google
    </button>
    
    <button id="btnPenabur" type="button" class="oauthButton">
    <img src="Penabur1.png" alt="Logo Penabur" style="width: 50px; height: 50px; flex-shrink: 0;">
      Continue with Penabur Account
    </button>

    <div class="separator">
      <div></div><span>OR</span><div></div>
    </div>

    <input type="email" placeholder="Email (Check untuk magic link)" name="email" id="inputEmail">

    <button id="btnEmail" type="button" class="oauthButton">
      Continue
      <svg class="icon" xmlns="http://w3.org" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 17 5-5-5-5"></path><path d="m13 17 5-5-5-5"></path></svg>
    </button>
  </form>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBzbkbeMgFvqrwIh1GRlO5xjxHxb7h7mC4",
      authDomain: "arlando-67676.firebaseapp.com",
      projectId: "arlando-67676",
      storageBucket: "arlando-67676.firebasestorage.app",
      messagingSenderId: "907609629858",
      appId: "1:907609629858:web:111402a8102d99eebe23fb",
      measurementId: "G-32DD1VGDQ4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });

    const btnGoogle = document.getElementById('btnGoogle');
    const btnEmail = document.getElementById('btnEmail');
    const inputEmail = document.getElementById('inputEmail');
    const alertBox = document.getElementById('alertBox');

    function showAlert(message, type) {
      alertBox.className = "alert-box " + type;
      alertBox.innerText = message;
    }

    // Fungsi kirim token ke backend Node.js
    async function verifikasiKeBackend(idToken, userObj) {
      const response = await fetch('http://localhost:3000/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: idToken })
      });
      if (response.ok) {
        sessionStorage.setItem('isLoggedIn', 'true');
        sessionStorage.setItem('userEmail', userObj.email);
        sessionStorage.setItem('userName', userObj.displayName || userObj.email.split('@')[0]);
        showAlert("Login sukses! Mengalihkan...", "success");
        setTimeout(() => { window.location.href = "Assgp.html"; }, 1000);
      } else {
        const errData = await response.json();
        await signOut(auth);
        showAlert("Backend menolak: " + errData.error, "error");
      }
    }

    // DETEKSI OTOMATIS JIKA USER KLIK LINK DARI EMAIL
    if (isSignInWithEmailLink(auth, window.location.href)) {
      let email = window.localStorage.getItem('emailForSignIn');
      if (!email) { email = window.prompt('Masukkan kembali email kamu untuk konfirmasi:'); }
      if (email) {
        showAlert("Memverifikasi link login...", "success");
        signInWithEmailLink(auth, email, window.location.href)
          .then(async (result) => {
            window.localStorage.removeItem('emailForSignIn');
            const idToken = await result.user.getIdToken();
            await verifikasiKeBackend(idToken, result.user);
          })
          .catch((error) => { showAlert("Link salah atau kedaluwarsa: " + error.message, "error"); });
      }
    }

    // TOMBOL GOOGLE
    btnGoogle.addEventListener('click', async () => {
      try {
        btnGoogle.disabled = true; btnGoogle.style.opacity = "0.6"; alertBox.className = "alert-box";
        const result = await signInWithPopup(auth, provider);
        if (result.user.email && result.user.email.endsWith('@gmail.com')) {
          const idToken = await result.user.getIdToken();
          await verifikasiKeBackend(idToken, result.user);
        } else {
          await signOut(auth);
          showAlert("Akses ditolak! Wajib menggunakan email @gmail.com jika lewat tombol Google.", "error");
        }
      } catch (error) {
        if (error.code === 'auth/unauthorized-domain') { showAlert("Error domain! Jalankan pakai Live Server.", "error"); }
        else { showAlert("Gagal masuk: " + error.message, "error"); }
      } finally { btnGoogle.disabled = false; btnGoogle.style.opacity = "1"; }
    });
  // Tombol penabur
      btnPenabur.addEventListener('click', async () => {
      try {
        btnPenabur.disabled = true; btnPenabur.style.opacity = "0.6"; alertBox.className = "alert-box";
        const result = await signInWithPopup(auth, provider);
        if (result.user.email && result.user.email.endsWith('@bpkpenabur.sch.id')) {
          const idToken = await result.user.getIdToken();
          await verifikasiKeBackend(idToken, result.user);
        } else {
          await signOut(auth);
          showAlert("Akses ditolak! Wajib menggunakan email @bpkpenabur.sch.id jika lewat tombol Penabur.", "error");
        }
      } catch (error) {
        if (error.code === 'auth/unauthorized-domain') { showAlert("Error domain! Jalankan pakai Live Server.", "error"); }
        else { showAlert("Gagal masuk: " + error.message, "error"); }
      } finally { btnPenabur.disabled = false; btnPenabur.style.opacity = "1"; }
    });

    // TOMBOL EMAIL UMUM (MAGIC LINK)
    btnEmail.addEventListener('click', async (e) => {
      e.preventDefault();
      const emailVal = inputEmail.value.trim();
      if (!emailVal) { showAlert("Masukkan alamat email terlebih dahulu!", "error"); return; }
      try {
        btnEmail.disabled = true; btnEmail.style.opacity = "0.6";
        await sendSignInLinkToEmail(auth, emailVal, { url: window.location.href, handleCodeInApp: true });
        window.localStorage.setItem('emailForSignIn', emailVal);
        showAlert("Link masuk telah dikirim! Silakan cek kotak masuk/spam email kamu.", "success");
        inputEmail.value = "";
      } catch (error) { showAlert("Gagal kirim email: " + error.message, "error"); }
      finally { btnEmail.disabled = false; btnEmail.style.opacity = "1"; }
    });
  </script>
</body>
</html>
